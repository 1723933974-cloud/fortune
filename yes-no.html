<title>是否神谕 · 让宇宙告诉你答案 | pboboo.cn</title>
<meta name="description" content="无法做决定？让神谕给你一个答案。输入你的问题，宇宙会告诉你「是」还是「否」。">
<link rel="canonical" href="https://pboboo.cn/yes-no.html">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#07070f;--card:#13131f;--accent:#9d7bff;--accent2:#ff7eb3;--text:#eeeeff;--muted:#6b6b90;--muted2:#9494b8;--border:rgba(255,255,255,0.06)}
body{background:var(--bg);color:var(--text);font-family:'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:0 24px 80px}
.topbar{width:100%;max-width:600px;display:flex;align-items:center;padding:16px 0 8px;gap:8px}
.back-link{color:var(--muted2);text-decoration:none;font-size:13px;display:flex;align-items:center;gap:4px}
.back-link:hover{color:var(--accent)}
.tool-wrap{width:100%;max-width:520px;margin-top:32px}
.tool-header{text-align:center;margin-bottom:36px}
.tool-badge{display:inline-block;background:rgba(157,123,255,0.1);border:1px solid rgba(157,123,255,0.2);border-radius:100px;padding:5px 16px;font-size:12px;color:var(--accent);letter-spacing:2px;margin-bottom:14px}
.tool-header h1{font-size:clamp(26px,6vw,40px);font-weight:800;margin-bottom:10px;background:linear-gradient(135deg,#fff 0%,#c4b5ff 40%,#ff7eb3 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.tool-header p{color:var(--muted2);font-size:13px;line-height:1.8}
.tool-card{background:var(--card);border:1px solid var(--border);border-radius:24px;padding:36px 28px;text-align:center;margin-bottom:16px}
.result-display{font-size:clamp(64px,16vw,110px);font-weight:900;margin:20px 0;min-height:120px;display:flex;align-items:center;justify-content:center;transition:all .4s}
.yes-text{background:linear-gradient(135deg,#a8ff78,#78ffd6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.no-text{background:linear-gradient(135deg,#ff7eb3,#ff758c);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.sub-text{font-size:14px;color:var(--muted2);margin-bottom:20px;min-height:22px}
.btn-go{background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:100px;color:#fff;font-size:15px;font-weight:700;padding:14px 44px;cursor:pointer;transition:all .2s;letter-spacing:1px}
.btn-go:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(157,123,255,0.4)}
.info-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:24px;margin-bottom:12px}
.info-card h2{font-size:14px;font-weight:600;color:var(--accent);margin-bottom:10px}
.info-card p{font-size:13px;color:var(--muted2);line-height:1.9}
footer{width:100%;max-width:600px;text-align:center;padding:28px 0 40px;border-top:1px solid rgba(255,255,255,0.04);margin-top:32px;font-size:11px;color:var(--muted);line-height:2.4}
footer a{color:var(--muted2);text-decoration:none;margin:0 8px}
footer a:hover{color:var(--accent)}
</style>
</head>
<body>
<div class="topbar">
  <a href="/" class="back-link">← 返回首页</a>
</div>

<div class="tool-wrap">
  <div class="tool-header">
    <div class="tool-badge">✦ 是否神谕 ✦</div>
    <h1>是还是否？</h1>
    <p>心中默念你的问题<br>让宇宙给你一个答案</p>
  </div>

  <div class="tool-card">
    <p style="font-size:13px;color:var(--muted2);margin-bottom:16px">专注于你的问题，然后点击按钮</p>
    <div class="result-display" id="result"><span style="font-size:40px;opacity:0.15">✦</span></div>
    <div class="sub-text" id="subtext"></div>
    <button class="btn-go" onclick="askOracle()">✦ 请神谕降临</button>
  </div>

  <div class="info-card">
    <h2>什么是是否神谕？</h2>
    <p>当你面对一个两难的决定，有时候只需要一个清晰的信号。是否神谕是一种简单的占卜工具，帮助你从纠结中解脱出来。</p>
  </div>
  <div class="info-card">
    <h2>使用方法</h2>
    <p>1. 在心中默想一个明确的是/否问题<br>2. 深呼一口气，专注于这个问题<br>3. 点击按钮，接受宇宙的回答<br>4. 注意你第一时间的心理反应——那往往才是你真正想要的答案</p>
  </div>
</div>

</footer>

<script>
const yesMsg = ["去吧，宇宙支持你。","没有疑问，就是这样。","时机已到，放手去做。","答案很清晰：是的。","星辰为你点头。"];
const noMsg  = ["暂时不是时候。","宇宙说：缓一缓。","也许还有更好的时机。","这次先放一放吧。","不，但这未必是坏事。"];
function askOracle(){
  const r=document.getElementById('result'),s=document.getElementById('subtext');
  r.className='result-display';r.innerHTML='<span style="opacity:0.2">...</span>';s.textContent='';
  setTimeout(()=>{
    const yes=Math.random()<.5;
    r.className='result-display '+(yes?'yes-text':'no-text');
    r.textContent=yes?'是':'否';
    const msgs=yes?yesMsg:noMsg;
    s.textContent=msgs[Math.floor(Math.random()*msgs.length)];
  },600);
}
</script>
</body>
</html>
