<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>今日运势</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0a0a12;
    --card: #12121e;
    --border: rgba(255,255,255,0.07);
    --accent: #7c6aff;
    --accent2: #ff6ab0;
    --text: #e8e8f0;
    --muted: #6b6b8a;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* 星空背景 */
  .starfield {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
  }
  .starfield canvas { width: 100%; height: 100%; }

  .app {
    position: relative;
    z-index: 1;
    max-width: 900px;
    margin: 0 auto;
    padding: 60px 24px 80px;
  }

  /* 标题区 */
  .header {
    text-align: center;
    margin-bottom: 56px;
  }
  .header .eyebrow {
    font-size: 11px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--accent);
    opacity: 0.8;
    margin-bottom: 14px;
  }
  .header h1 {
    font-size: clamp(32px, 6vw, 52px);
    font-weight: 700;
    background: linear-gradient(135deg, #fff 0%, #a89bff 50%, #ff6ab0 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1.2;
    margin-bottom: 12px;
  }
  .header p {
    color: var(--muted);
    font-size: 14px;
    letter-spacing: 0.5px;
  }

  /* 日期胶囊 */
  .date-pill {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(124,106,255,0.1);
    border: 1px solid rgba(124,106,255,0.25);
    border-radius: 100px;
    padding: 6px 16px;
    font-size: 13px;
    color: #a89bff;
    margin-top: 20px;
  }
  .date-pill::before { content: '◎'; font-size: 10px; }

  /* 星座选择器 */
  .zodiac-section {
    margin-bottom: 48px;
  }
  .zodiac-label {
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 20px;
    text-align: center;
  }
  .zodiac-grid {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 10px;
  }
  @media (max-width: 600px) {
    .zodiac-grid { grid-template-columns: repeat(4, 1fr); }
  }
  @media (max-width: 400px) {
    .zodiac-grid { grid-template-columns: repeat(3, 1fr); }
  }

  .zodiac-btn {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 14px 8px;
    cursor: pointer;
    transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    color: var(--muted);
    font-size: 12px;
    user-select: none;
  }
  .zodiac-btn:hover {
    border-color: rgba(124,106,255,0.4);
    transform: translateY(-3px);
    color: var(--text);
    background: rgba(124,106,255,0.08);
  }
  .zodiac-btn.active {
    border-color: var(--accent);
    background: linear-gradient(135deg, rgba(124,106,255,0.2), rgba(255,106,176,0.1));
    color: #fff;
    transform: translateY(-4px);
    box-shadow: 0 8px 32px rgba(124,106,255,0.3);
  }
  .zodiac-btn .emoji { font-size: 24px; line-height: 1; }
  .zodiac-btn .name { font-size: 11px; letter-spacing: 0.5px; }

  /* 运势卡片区 */
  .result-section {
    opacity: 0;
    transform: translateY(30px);
    transition: opacity 0.6s ease, transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
    pointer-events: none;
  }
  .result-section.visible {
    opacity: 1;
    transform: translateY(0);
    pointer-events: auto;
  }

  /* 主卡片 */
  .main-card {
    background: linear-gradient(135deg, rgba(124,106,255,0.12) 0%, rgba(255,106,176,0.08) 100%);
    border: 1px solid rgba(124,106,255,0.25);
    border-radius: 28px;
    padding: 40px;
    margin-bottom: 20px;
    position: relative;
    overflow: hidden;
  }
  .main-card::before {
    content: '';
    position: absolute;
    top: -60px; right: -60px;
    width: 200px; height: 200px;
    background: radial-gradient(circle, rgba(124,106,255,0.15) 0%, transparent 70%);
    pointer-events: none;
  }
  .main-card::after {
    content: '';
    position: absolute;
    bottom: -40px; left: -40px;
    width: 160px; height: 160px;
    background: radial-gradient(circle, rgba(255,106,176,0.12) 0%, transparent 70%);
    pointer-events: none;
  }

  .card-header {
    display: flex;
    align-items: center;
    gap: 20px;
    margin-bottom: 28px;
  }
  .big-emoji {
    font-size: 56px;
    line-height: 1;
    filter: drop-shadow(0 0 20px rgba(124,106,255,0.5));
  }
  .card-title h2 {
    font-size: 26px;
    font-weight: 700;
    margin-bottom: 4px;
  }
  .card-title .dates {
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 0.5px;
  }

  /* 总运势分 */
  .overall-score {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 28px;
    padding: 20px 24px;
    background: rgba(0,0,0,0.2);
    border-radius: 16px;
    border: 1px solid var(--border);
  }
  .score-number {
    font-size: 48px;
    font-weight: 800;
    background: linear-gradient(135deg, #7c6aff, #ff6ab0);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1;
    min-width: 70px;
  }
  .score-info { flex: 1; }
  .score-label {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .score-stars { font-size: 18px; letter-spacing: 2px; }
  .score-tagline {
    font-size: 13px;
    color: #a89bff;
    margin-top: 4px;
  }

  /* 今日寄语 */
  .daily-word {
    font-size: 15px;
    line-height: 1.8;
    color: rgba(232,232,240,0.85);
    padding: 0 4px;
    border-left: 3px solid var(--accent);
    padding-left: 16px;
  }

  /* 四格运势 */
  .fortune-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 14px;
    margin-top: 20px;
  }
  @media (max-width: 500px) {
    .fortune-grid { grid-template-columns: 1fr; }
  }

  .fortune-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 22px;
    transition: border-color 0.3s;
  }
  .fortune-card:hover { border-color: rgba(124,106,255,0.3); }

  .fortune-card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }
  .fortune-type {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
  }
  .fortune-icon {
    width: 32px; height: 32px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
  }
  .fortune-icon.love    { background: rgba(255,106,176,0.15); }
  .fortune-icon.career  { background: rgba(124,106,255,0.15); }
  .fortune-icon.wealth  { background: rgba(255,196,0,0.15); }
  .fortune-icon.health  { background: rgba(0,224,150,0.15); }

  /* 进度条 */
  .bar-wrap {
    height: 6px;
    background: rgba(255,255,255,0.06);
    border-radius: 100px;
    overflow: hidden;
    margin-bottom: 10px;
  }
  .bar-fill {
    height: 100%;
    border-radius: 100px;
    transition: width 1.2s cubic-bezier(0.34, 1.56, 0.64, 1);
    width: 0;
  }
  .bar-fill.love    { background: linear-gradient(90deg, #ff6ab0, #ff9de2); }
  .bar-fill.career  { background: linear-gradient(90deg, #7c6aff, #a89bff); }
  .bar-fill.wealth  { background: linear-gradient(90deg, #f6c90e, #ffe066); }
  .bar-fill.health  { background: linear-gradient(90deg, #00e096, #6effcb); }

  .fortune-card-text {
    font-size: 12px;
    color: var(--muted);
    line-height: 1.7;
  }

  /* 幸运信息行 */
  .lucky-row {
    display: flex;
    gap: 12px;
    margin-top: 20px;
    flex-wrap: wrap;
  }
  .lucky-item {
    flex: 1;
    min-width: 120px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px 16px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .lucky-item .l-label {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }
  .lucky-item .l-value {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
  }

  /* 加载动画 */
  @keyframes shimmer {
    0% { background-position: -200% 0; }
    100% { background-position: 200% 0; }
  }
  .loading-text {
    text-align: center;
    padding: 60px 0;
    color: var(--muted);
    font-size: 14px;
  }
  .loading-text .dots::after {
    content: '';
    animation: dots 1.5s infinite;
  }
  @keyframes dots {
    0%   { content: '.'; }
    33%  { content: '..'; }
    66%  { content: '...'; }
  }

  /* 分隔线 */
  .divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 28px 0;
  }

  /* 底部 */
  .footer {
    text-align: center;
    margin-top: 60px;
    font-size: 11px;
    color: var(--muted);
    opacity: 0.5;
    letter-spacing: 1px;
  }
</style>
</head>
<body>

<div class="starfield" id="starfield">
  <canvas id="stars"></canvas>
</div>

<div class="app">

  </section>

  <footer class="footer">✦ 星象仅供娱乐参考 ✦</footer>

<script>
// ── 星空背景 ──
const canvas = document.getElementById('stars');
const ctx = canvas.getContext('2d');
let stars = [];

function initStars() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  stars = Array.from({length: 160}, () => ({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    r: Math.random() * 1.4 + 0.2,
    a: Math.random(),
    speed: Math.random() * 0.008 + 0.002
  }));
}

function drawStars() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  stars.forEach(s => {
    s.a += s.speed;
    const alpha = (Math.sin(s.a) + 1) / 2 * 0.6 + 0.1;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(200,195,255,${alpha})`;
    ctx.fill();
  });
  requestAnimationFrame(drawStars);
}

window.addEventListener('resize', initStars);
initStars();
drawStars();

const LUCKY_COLORS = ['星空蓝','紫水晶','暗金','深玫红','墨绿','珊瑚橙','月光白','琥珀黄'];
const LUCKY_STONES = ['紫水晶','月光石','黑曜石','青金石','玫瑰石英','虎眼石','绿松石','拉长石'];
const LUCKY_NUMS = [3,7,8,9,12,18,21,27];

// ── 根据星座+日期生成"今日"数据 ──
function seedRandom(seed) {
  let x = Math.sin(seed) * 10000;
  return x - Math.floor(x);
}

function getFortuneData(zodiacIndex) {
  const now = new Date();
  const seed = now.getFullYear() * 10000 + (now.getMonth()+1) * 100 + now.getDate() + zodiacIndex * 37;
  const r = (offset) => seedRandom(seed + offset);

  const scores = {
    overall: Math.floor(r(1) * 30 + 65),
    love:    Math.floor(r(2) * 40 + 55),
    career:  Math.floor(r(3) * 40 + 55),
    wealth:  Math.floor(r(4) * 40 + 55),
    health:  Math.floor(r(5) * 40 + 55),
  };

  const z = ZODIACS[zodiacIndex];
  const words = DAILY_WORDS[z.name];
  const wordIdx = Math.floor(r(6) * words.length);

  const taglines = ['运势平稳，稳中求进', '今日气场强劲', '内外和谐，万事顺遂', '厚积薄发的好时机', '小惊喜在等你', '沉淀自己，蓄势待发'];

  return {
    score: scores.overall,
    tagline: taglines[Math.floor(r(7) * taglines.length)],
    dailyWord: words[wordIdx],
    love: { score: scores.love, text: LOVE_TEXTS[Math.floor(r(8)*LOVE_TEXTS.length)] },
    career: { score: scores.career, text: CAREER_TEXTS[Math.floor(r(9)*CAREER_TEXTS.length)] },
    wealth: { score: scores.wealth, text: WEALTH_TEXTS[Math.floor(r(10)*WEALTH_TEXTS.length)] },
    health: { score: scores.health, text: HEALTH_TEXTS[Math.floor(r(11)*HEALTH_TEXTS.length)] },
    color: LUCKY_COLORS[Math.floor(r(12)*LUCKY_COLORS.length)],
    num:   LUCKY_NUMS[Math.floor(r(13)*LUCKY_NUMS.length)],
    stone: LUCKY_STONES[Math.floor(r(14)*LUCKY_STONES.length)],
    luckySign: ZODIACS[Math.floor(r(15)*ZODIACS.length)].name,
  };
}

function starsFromScore(score) {
  const full = Math.round(score / 20);
  return '★'.repeat(Math.min(full, 5)) + '☆'.repeat(Math.max(0, 5 - full));
}

// ── 渲染 ──
function showFortune(index) {
  const z = ZODIACS[index];
  const d = getFortuneData(index);

  document.getElementById('resEmoji').textContent = z.emoji;
  document.getElementById('resName').textContent = z.name;
  document.getElementById('resDates').textContent = z.dates + ' · ' + z.element + '象星座 · 守护星 ' + z.ruling;
  document.getElementById('resScore').textContent = d.score;
  document.getElementById('resStars').textContent = starsFromScore(d.score);
  document.getElementById('resTagline').textContent = d.tagline;
  document.getElementById('resDailyWord').textContent = d.dailyWord;

  // 四格
  const fields = [
    { key:'love',   barId:'loveBar',   scoreId:'loveScore',   textId:'loveText'   },
    { key:'career', barId:'careerBar', scoreId:'careerScore', textId:'careerText' },
    { key:'wealth', barId:'wealthBar', scoreId:'wealthScore', textId:'wealthText' },
    { key:'health', barId:'healthBar', scoreId:'healthScore', textId:'healthText' },
  ];
  fields.forEach(f => {
    document.getElementById(f.scoreId).textContent = d[f.key].score + '分';
    document.getElementById(f.textId).textContent  = d[f.key].text;
    // 先重置
    const bar = document.getElementById(f.barId);
    bar.style.width = '0';
    setTimeout(() => { bar.style.width = d[f.key].score + '%'; }, 100);
  });

  document.getElementById('luckyColor').textContent = d.color;
  document.getElementById('luckyNum').textContent   = d.num;
  document.getElementById('luckyStone').textContent = d.stone;
  document.getElementById('luckySign').textContent  = d.luckySign;

  const section = document.getElementById('resultSection');
  section.classList.add('visible');
  setTimeout(() => {
    section.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }, 100);
}

// ── 初始化 ──
function init() {
  // 日期
  const now = new Date();
  const days = ['日','一','二','三','四','五','六'];
  document.getElementById('dateDisplay').textContent =
    now.getFullYear() + '年' + (now.getMonth()+1) + '月' + now.getDate() + '日  星期' + days[now.getDay()];

  // 星座按钮
  const grid = document.getElementById('zodiacGrid');
  ZODIACS.forEach((z, i) => {
    const btn = document.createElement('button');
    btn.className = 'zodiac-btn';
    btn.innerHTML = `<span class="emoji">${z.emoji}</span><span class="name">${z.name}</span>`;
    btn.addEventListener('click', () => {
      document.querySelectorAll('.zodiac-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      showFortune(i);
    });
    grid.appendChild(btn);
  });
}
