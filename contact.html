<!DOCTYPE html>
<html lang="zh-CN" id="htmlRoot">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="pageTitle">联系我们 · pboboo.cn</title>
<meta id="pageDesc" name="description" content="有任何问题、建议或合作意向，欢迎通过邮件联系我们。">

<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#07070f;--card:#13131f;--accent:#9d7bff;--accent2:#ff7eb3;--text:#eeeeff;--muted:#6b6b90;--muted2:#9494b8;--border:rgba(255,255,255,0.06)}
body{background:var(--bg);color:var(--text);font-family:'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;min-height:100vh;padding:56px 24px 80px}
.wrap{max-width:680px;margin:0 auto}
.back{display:inline-flex;align-items:center;gap:6px;color:var(--muted2);font-size:13px;text-decoration:none;margin-bottom:32px;transition:color .2s}
.back:hover{color:var(--accent)}
.hero{text-align:center;padding:48px 24px;background:linear-gradient(135deg,rgba(157,123,255,0.1),rgba(255,126,179,0.07));border:1px solid rgba(157,123,255,0.2);border-radius:28px;margin-bottom:24px}
.hero-emoji{font-size:56px;display:block;margin-bottom:16px}
h1{font-size:26px;font-weight:700;margin-bottom:8px}
.tagline{font-size:13px;color:var(--muted2);line-height:1.8}
.section{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:28px;margin-bottom:16px}
h2{font-size:15px;font-weight:600;color:var(--accent);margin-bottom:14px}
p{font-size:13px;color:var(--muted2);line-height:2;margin-bottom:10px}
p:last-child{margin-bottom:0}

/* 邮件卡片 */
.email-card{display:flex;align-items:center;gap:16px;background:linear-gradient(135deg,rgba(157,123,255,0.08),rgba(255,126,179,0.05));border:1px solid rgba(157,123,255,0.25);border-radius:16px;padding:20px 24px;margin-bottom:16px;cursor:pointer;transition:all .25s;text-decoration:none}
.email-card:hover{border-color:rgba(157,123,255,0.5);background:linear-gradient(135deg,rgba(157,123,255,0.15),rgba(255,126,179,0.1))}
.email-icon{font-size:32px;flex-shrink:0}
.email-info{flex:1;min-width:0}
.email-label{font-size:11px;color:var(--muted);letter-spacing:1px;margin-bottom:4px}
.email-addr{font-size:15px;font-weight:600;color:var(--accent);letter-spacing:.5px}
.email-copy{font-size:11px;color:var(--muted);margin-top:3px}
.copy-btn{background:rgba(157,123,255,0.15);border:1px solid rgba(157,123,255,0.3);color:var(--accent);font-size:12px;padding:6px 14px;border-radius:100px;cursor:pointer;transition:all .2s;flex-shrink:0}
.copy-btn:hover{background:rgba(157,123,255,0.3)}
.copy-btn.copied{background:rgba(100,220,150,0.15);border-color:rgba(100,220,150,0.4);color:#6ddc96}

/* 场景列表 */
.topic-list{display:flex;flex-direction:column;gap:10px}
.topic-item{display:flex;align-items:flex-start;gap:12px;font-size:13px;color:var(--muted2);line-height:1.8}
.topic-icon{font-size:18px;flex-shrink:0;margin-top:1px}

/* 回复说明 */
.reply-note{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,0.03);border-radius:12px;padding:14px 18px;font-size:12px;color:var(--muted)}
.reply-note span{font-size:20px}

.cta{display:block;text-align:center;margin-top:32px;padding:16px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:14px;color:#fff;font-size:15px;font-weight:600;text-decoration:none;transition:opacity .2s}
.cta:hover{opacity:.85}

footer{text-align:center;margin-top:48px;font-size:11px;color:var(--muted);opacity:.5}
footer a{color:var(--muted2);text-decoration:none;margin:0 8px}
.lang-switch{position:fixed;top:16px;right:16px;z-index:999;display:flex;gap:6px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:100px;padding:4px 6px;backdrop-filter:blur(8px)}
.lang-btn{background:none;border:none;color:var(--muted);font-size:11px;font-weight:600;padding:4px 10px;border-radius:100px;cursor:pointer;transition:all .25s;letter-spacing:.5px}
.lang-btn.active{background:rgba(157,123,255,0.25);color:var(--accent);border:1px solid rgba(157,123,255,0.35)}
</style>
</head>
<body>

<div class="lang-switch">
  <button class="lang-btn active" id="btnZH" onclick="setLang('zh')">中文</button>
  <button class="lang-btn" id="btnEN" onclick="setLang('en')">EN</button>
</div>

<div class="wrap">
  <a href="/" class="back" data-zh="← 返回首页" data-en="← Back to Home">← 返回首页</a>

  <div class="hero">
    <span class="hero-emoji">💌</span>
    <h1 data-zh="联系我们" data-en="Contact Us">联系我们</h1>
    <p class="tagline" data-zh="有任何问题、建议或想法，都欢迎写信给我们<br>我们认真阅读每一封邮件" data-en="Questions, feedback, or ideas — we'd love to hear from you<br>We read every email personally">有任何问题、建议或想法，都欢迎写信给我们<br>我们认真阅读每一封邮件</p>
  </div>

  <!-- 邮箱卡片 -->
  <div class="section">
    <h2 data-zh="📬 邮件联系" data-en="📬 Email Us">📬 邮件联系</h2>
    <div class="email-card" onclick="copyEmail()">
      <span class="email-icon">✉️</span>
      <div class="email-info">
        <div class="email-label" data-zh="官方邮箱" data-en="Official Email">官方邮箱</div>
        <div class="email-addr">1723933974@qq.com</div>
        <div class="email-copy" data-zh="点击复制邮箱地址" data-en="Click to copy email address">点击复制邮箱地址</div>
      </div>
      <button class="copy-btn" id="copyBtn" data-zh="复制" data-en="Copy">复制</button>
    </div>
    <div class="reply-note">
      <span>⏱️</span>
      <span data-zh="我们通常在 1-3 个工作日内回复，节假日可能稍有延迟" data-en="We typically reply within 1–3 business days. Responses may be delayed during holidays.">我们通常在 1-3 个工作日内回复，节假日可能稍有延迟</span>
    </div>
  </div>

  <!-- 可以联系的话题 -->
  <div class="section">
    <h2 data-zh="💬 可以聊什么" data-en="💬 What to Write About">💬 可以聊什么</h2>
    <div class="topic-list">
      <div class="topic-item"><span class="topic-icon">🐛</span><span data-zh="发现了 Bug 或页面异常，欢迎告诉我们" data-en="Found a bug or something broken? Let us know">发现了 Bug 或页面异常，欢迎告诉我们</span></div>
      <div class="topic-item"><span class="topic-icon">💡</span><span data-zh="有新功能的想法或改进建议" data-en="Have a feature idea or suggestion for improvement">有新功能的想法或改进建议</span></div>
      <div class="topic-item"><span class="topic-icon">🤝</span><span data-zh="商务合作、内容合作或广告咨询" data-en="Business partnerships, content collaboration, or advertising inquiries">商务合作、内容合作或广告咨询</span></div>
      <div class="topic-item"><span class="topic-icon">🔒</span><span data-zh="隐私相关问题，包括数据删除请求" data-en="Privacy-related questions, including data deletion requests">隐私相关问题，包括数据删除请求</span></div>
      <div class="topic-item"><span class="topic-icon">💬</span><span data-zh="单纯想说说你的使用感受，我们也很想听" data-en="Just want to share your experience? We'd love to hear it">单纯想说说你的使用感受，我们也很想听</span></div>
    </div>
  </div>

  <a href="/" class="cta" data-zh="✦ 返回首页测一测今日运势" data-en="✦ Back to Check Today's Fortune">✦ 返回首页测一测今日运势</a>
</div>

<footer>
  <a href="/" data-zh="首页" data-en="Home">首页</a> |
  <a href="/about.html" data-zh="关于本站" data-en="About">关于本站</a> |
  <a href="/privacy.html" data-zh="隐私政策" data-en="Privacy">隐私政策</a> |
  <a href="/terms.html" data-zh="服务条款" data-en="Terms">服务条款</a> |
  <a href="/faq.html" data-zh="常见问题" data-en="FAQ">常见问题</a> |
  <a href="/contact.html" data-zh="联系我们" data-en="Contact">联系我们</a>
  <br><br>© 2026 pboboo.cn
</footer>

<script>
const LANG_KEY = 'fortune_lang';
let LANG = localStorage.getItem(LANG_KEY) || 'zh';

function setLang(lang) {
  LANG = lang;
  localStorage.setItem(LANG_KEY, lang);
  document.getElementById('htmlRoot').lang = lang === 'zh' ? 'zh-CN' : 'en';
  document.getElementById('btnZH').classList.toggle('active', lang === 'zh');
  document.getElementById('btnEN').classList.toggle('active', lang === 'en');
  document.querySelectorAll('[data-zh]').forEach(el => {
    const val = el.getAttribute('data-' + lang);
    if (val !== null) el.innerHTML = val;
  });
  if (lang === 'en') {
    document.getElementById('pageTitle').textContent = 'Contact Us · pboboo.cn';
    document.getElementById('pageDesc').setAttribute('content', 'Have questions, feedback, or ideas? Reach out to the pboboo.cn team — we read every email.');
  } else {
    document.getElementById('pageTitle').textContent = '联系我们 · pboboo.cn';
    document.getElementById('pageDesc').setAttribute('content', '有任何问题、建议或合作意向，欢迎通过邮件联系我们。');
  }
}

function copyEmail() {
  navigator.clipboard.writeText('1723933974@qq.com').then(() => {
    const btn = document.getElementById('copyBtn');
    const original = btn.textContent;
    btn.textContent = LANG === 'zh' ? '已复制 ✓' : 'Copied ✓';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = original;
      btn.classList.remove('copied');
    }, 2000);
  }).catch(() => {
    // fallback
    const el = document.createElement('textarea');
    el.value = '1723933974@qq.com';
    document.body.appendChild(el);
    el.select();
    document.execCommand('copy');
    document.body.removeChild(el);
    const btn = document.getElementById('copyBtn');
    btn.textContent = LANG === 'zh' ? '已复制 ✓' : 'Copied ✓';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = LANG === 'zh' ? '复制' : 'Copy';
      btn.classList.remove('copied');
    }, 2000);
  });
}

setLang(LANG);
</script>
</body>
</html>
